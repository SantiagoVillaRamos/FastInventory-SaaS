<!-- Catalog Module — modules/catalog/catalog.html -->

<div class="app-main__header">
  <h1 class="app-main__title">Catálogo</h1>
  <p class="app-main__subtitle">Gestiona tus productos y categorías</p>
</div>

<!-- Tabs Navigation -->
<div class="tabs">
  <button class="tabs__btn active" data-tab="products">Productos</button>
  <button class="tabs__btn" data-tab="categories">Categorías</button>
</div>

<!-- ── TAB: PRODUCTOS ─────────────────────────────────────────── -->
<div class="tab-content active" id="tab-products">
  <div class="toolbar">
    <div class="toolbar__search">
      <span class="toolbar__search-icon">🔍</span>
      <input type="text" id="searchProduct" placeholder="Buscar por nombre..." />
    </div>
    <button class="btn btn--primary admin-only" id="btnNewProduct">+ Nuevo Producto</button>
  </div>

  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Unidad</th>
          <th class="admin-only">Acciones</th>
        </tr>
      </thead>
      <tbody id="productsTableBody">
        <tr><td colspan="6" class="text-center">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── TAB: CATEGORÍAS ────────────────────────────────────────── -->
<div class="tab-content" id="tab-categories">
  <div class="toolbar">
    <div class="toolbar__search">
      <!-- Espacio vacío para alinear el botón a la derecha -->
    </div>
    <button class="btn btn--primary admin-only" id="btnNewCategory">+ Nueva Categoría</button>
  </div>

  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th class="admin-only">Acciones</th>
        </tr>
      </thead>
      <tbody id="categoriesTableBody">
        <tr><td colspan="3" class="text-center">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── MODAL: CATEGORÍA ───────────────────────────────────────── -->
<div class="modal-overlay" id="modalCategory" hidden>
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="modalCategoryTitle">Nueva Categoría</h2>
      <button class="modal__close" onclick="closeModal('modalCategory')">✕</button>
    </div>
    <form class="modal__body" id="formCategory">
      <input type="hidden" id="categoryId" />
      <div class="form-group">
        <label for="catName">Nombre <span class="required">*</span></label>
        <input type="text" id="catName" required minlength="2" maxlength="100" />
      </div>
      <div class="form-group">
        <label for="catDesc">Descripción</label>
        <textarea id="catDesc" rows="3" maxlength="500"></textarea>
      </div>
      <div class="form-error" id="catError"></div>
      <div class="modal__footer">
        <button type="button" class="btn btn--outline" onclick="closeModal('modalCategory')">Cancelar</button>
        <button type="submit" class="btn btn--primary" id="btnSaveCategory">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- ── MODAL: PRODUCTO ────────────────────────────────────────── -->
<div class="modal-overlay" id="modalProduct" hidden>
  <div class="modal modal--lg">
    <div class="modal__header">
      <h2 class="modal__title" id="modalProductTitle">Nuevo Producto</h2>
      <button class="modal__close" onclick="closeModal('modalProduct')">✕</button>
    </div>
    <form class="modal__body" id="formProduct">
      <input type="hidden" id="productId" />
      
      <div class="form-grid">
        <div class="form-group">
          <label for="prodName">Nombre <span class="required">*</span></label>
          <input type="text" id="prodName" required minlength="2" maxlength="150" />
        </div>
        <div class="form-group">
          <label for="prodCategory">Categoría <span class="required">*</span></label>
          <select id="prodCategory" required>
            <option value="">Seleccione...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="prodPrice">Precio <span class="required">*</span></label>
          <input type="number" id="prodPrice" required min="1" step="0.01" />
        </div>
        <div class="form-group">
          <label for="prodStock">Stock Inicial <span class="required">*</span></label>
          <input type="number" id="prodStock" required min="0" step="1" value="0" />
        </div>
        <div class="form-group">
          <label for="prodUnit">Unidad <span class="required">*</span></label>
          <input type="text" id="prodUnit" required maxlength="20" placeholder="ej. unidad, kg, litro" value="unidad" />
        </div>
      </div>

      <div class="form-error" id="prodError"></div>
      
      <div class="modal__footer">
        <button type="button" class="btn btn--outline" onclick="closeModal('modalProduct')">Cancelar</button>
        <button type="submit" class="btn btn--primary" id="btnSaveProduct">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- ── MODAL: CONFIRMAR ELIMINAR ──────────────────────────────── -->
<div class="modal-overlay" id="modalDelete" hidden>
  <div class="modal modal--sm">
    <div class="modal__header">
      <h2 class="modal__title">Confirmar Eliminación</h2>
      <button class="modal__close" onclick="closeModal('modalDelete')">✕</button>
    </div>
    <div class="modal__body">
      <p id="deleteMessage">¿Estás seguro de que deseas eliminar este elemento?</p>
      <div class="form-error" id="deleteError"></div>
      <div class="modal__footer">
        <button type="button" class="btn btn--outline" onclick="closeModal('modalDelete')">Cancelar</button>
        <button type="button" class="btn btn--danger" id="btnConfirmDelete">Eliminar</button>
      </div>
    </div>
  </div>
</div>
