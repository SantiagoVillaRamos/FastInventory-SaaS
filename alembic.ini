[alembic]
# Ruta al script de migraciones
script_location = alembic

# URL de la BD — será sobreescrita por core/config.py en runtime
sqlalchemy.url = postgresql+asyncpg://fastinventory_user:fastinventory_pass@localhost:5432/fastinventory_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
