name: CI — FastInventory SaaS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4

      - name: Configurar Python 3.11
        run: uv python install 3.11

      - name: Verificar código con Ruff
        run: |
          uv tool run ruff check app/
          uv tool run ruff format --check app/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: fastinventory_user
          POSTGRES_PASSWORD: fastinventory_pass
          POSTGRES_DB: fastinventory_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4

      - name: Configurar Python 3.11
        run: uv python install 3.11

      - name: Instalar dependencias
        run: uv pip install --system -r requirements.txt

      - name: Ejecutar migraciones
        env:
          DATABASE_URL: postgresql+asyncpg://fastinventory_user:fastinventory_pass@localhost:5432/fastinventory_db
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-secret-key-for-testing-only
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: alembic upgrade head

      - name: Ejecutar Tests
        env:
          DATABASE_URL: postgresql+asyncpg://fastinventory_user:fastinventory_pass@localhost:5432/fastinventory_db
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-secret-key-for-testing-only
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          uv pip install --system pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short
